<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Corrida</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0f; color: #fff; font-family: sans-serif; text-align: center; touch-action: none; user-select: none; }
        #setup { padding: 50px 20px; }
        input { font-size: 20px; padding: 10px; width: 60%; text-align: center; border-radius: 5px; border: 2px solid #ff00ff; background: #000; color: #fff; margin-bottom: 20px; }
        button.setup-btn { font-size: 20px; padding: 10px 20px; background-color: #00ffff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }
        
        /* Layout do Controle de Corrida */
        #gamepad { display: none; width: 100vw; height: 100vh; position: relative; }
        .btn { position: absolute; border-radius: 12px; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        /* Botões de Direção (Lado Esquerdo da Tela) */
        #btn-left { left: 5%; bottom: 15%; width: 100px; height: 100px; background: #ff00ff; border: 3px solid #ff99ff; }
        #btn-right { left: 35%; bottom: 15%; width: 100px; height: 100px; background: #ff00ff; border: 3px solid #ff99ff; }
        
        /* Botão de Nitro (Lado Direito da Tela) */
        #btn-nitro { right: 8%; bottom: 15%; width: 120px; height: 150px; background: #00ffff; color: #000; border: 3px solid #99ffff; border-radius: 20px; font-size: 28px; }
        
        .btn:active { opacity: 0.6; transform: scale(0.95); }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>

    <div id="setup">
        <h2>Controle de Corrida</h2>
        <p>Digite o código do painel do PC para parear:</p>
        <input type="number" id="room-input" placeholder="Código" pattern="\d*"><br>
        <button class="setup-btn" id="connect-btn">PAREAR CONTROLE</button>
    </div>

    <div id="gamepad">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-right">▶</div>
        <div class="btn" id="btn-nitro">NITRO</div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, update } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyCfdgkO3WzaxXT-djAA6MsLC2m26c9optU",
            authDomain: "slider-io.firebaseapp.com",
            databaseURL: "https://slider-io-default-rtdb.firebaseio.com",
            projectId: "slider-io",
            storageBucket: "slider-io.firebasestorage.app",
            messagingSenderId: "395647141464",
            appId: "1:395647141464:web:251cc58a3e0e90ca262c2d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let roomRef = null;

        const setupDiv = document.getElementById('setup');
        const gamepadDiv = document.getElementById('gamepad');
        const connectBtn = document.getElementById('connect-btn');
        const roomInput = document.getElementById('room-input');

        connectBtn.addEventListener('click', () => {
            const roomId = roomInput.value.trim();
            if(roomId.length > 0) {
                roomRef = ref(db, 'rooms_race/' + roomId);
                
                setupDiv.style.display = 'none';
                gamepadDiv.style.display = 'block';
                
                // Reseta estado inicial no Firebase
                update(roomRef, { direção: 0, nitro: false });
            }
        });

        // --- LÓGICA DE DETECÇÃO DOS BOTÕES (TOUCH) ---
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnNitro = document.getElementById('btn-nitro');

        let direcaoAtual = 0;

        // Função para atualizar direção no Firebase de forma otimizada
        function enviarDirecao(valor) {
            direcaoAtual = valor;
            if(roomRef) update(roomRef, { direção: valor });
        }

        // Toques da Seta Esquerda
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); enviarDirecao(-1); });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); if(direcaoAtual === -1) enviarDirecao(0); });

        // Toques da Seta Direita
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); enviarDirecao(1); });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); if(direcaoAtual === 1) enviarDirecao(0); });

        // Toques do Nitro (Segurar ativa, soltar desativa)
        btnNitro.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if(roomRef) update(roomRef, { nitro: true }); 
        });
        btnNitro.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            if(roomRef) update(roomRef, { nitro: false }); 
        });
    </script>
</body>
</html>
